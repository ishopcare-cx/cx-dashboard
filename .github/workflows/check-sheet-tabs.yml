name: check-sheet-tabs
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install google-auth==2.35.0 google-api-python-client==2.149.0
      - name: List tabs
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: |
          python -c "
          import config
          from google_credentials import build_credentials
          from googleapiclient.discovery import build
          import sys
          sys.stdout.reconfigure(encoding='utf-8')
          creds = build_credentials()
          svc = build('sheets', 'v4', credentials=creds, cache_discovery=False)
          meta = svc.spreadsheets().get(spreadsheetId=config.PERF_SHEET_ID, fields='sheets.properties').execute()
          for s in meta['sheets']:
              p = s['properties']
              title = p['title']
              print(repr(title), 'sheetId:', p['sheetId'])
          "
