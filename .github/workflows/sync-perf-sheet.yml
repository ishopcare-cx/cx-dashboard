name: sync-perf-sheet

# 창고 raw 탭 → 'CX 퍼포먼스(26.05~)' Call Raw 두 탭에 적재.
# 12:30 KST — 12:00 콜라비 수집(PC) 완료 후 창고 데이터를 읽어 씀.
# 전날 데이터는 12:00 수집 시 완전히 집계되므로 12:30에 최종 적재.
# (구글시트 쓰기는 클라우드 가능 — 콜라비 스크래핑과 달리 회사망 불필요)
on:
  schedule:
    - cron: '30 3 * * *'         # UTC 03:30 = KST 12:30
  workflow_dispatch: {}

concurrency:
  group: sync-perf-sheet
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install google-auth==2.35.0 google-api-python-client==2.149.0

      - name: Sync to CX 퍼포먼스 sheet
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: python sync_perf_sheet.py
